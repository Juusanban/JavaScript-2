<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>天気アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>天気アプリ</h1>

  <div class="search">
    <input type="text" id="cityInput" placeholder="都市名を入力 例: Kyoto">
    <button onclick="searchWeather()">検索</button>
  </div>

  <div id="message"></div>

  <div id="weatherCard" class="weather-card">
    <div id="weatherIcon" class="weather-icon">☀️</div>

    <h2 id="cityName">都市を検索してください</h2>

    <div id="weatherText">現在の天気</div>

    <div class="temperature">
      <span id="temperature">--</span>℃
    </div>

    <div class="details">
      <p>体感温度: <span id="apparentTemperature">--</span>℃</p>
      <p>湿度: <span id="humidity">--</span>%</p>
      <p>風速: <span id="windSpeed">--</span> km/h</p>
    </div>
  </div>
</div>

<script src="weather.js"></script>
</body>
</html>
